        const parseHistoryData = () => {
            return RAW_HISTORY_DATA.split('\n')
                .filter(line => line.trim().length > 0)
                .map((line, index) => {
                    const cleanLine = line.replace(/\*\*/g, '');
                    const firstColon = cleanLine.indexOf(':');
                    const firstDot = cleanLine.indexOf('.');
                    const topic = cleanLine.substring(firstDot + 1, firstColon).trim();
                    const detail = cleanLine.substring(firstColon + 1).trim();
                    return { id: index, topic, detail };
                });
        };

        const parseGeoHapData = (data) => {
            const map = {};
            const lines = data.split('\n');
            lines.forEach(line => {
                const match = line.match(/^(\d+)\.\s*(.*)/);
                if (match) {
                    const num = parseInt(match[1], 10);
                    map[num - 1] = match[2].replace(/\*\*/g, '').trim();
                }
            });
            return map;
        };

        const parseGeoData = (geoData, hapDataText) => {
            const hapMap = parseGeoHapData(hapDataText);
            const result = [];
            const blocks = geoData.split(/Soru \d+:/).filter(b => b.trim().length > 0);

            blocks.forEach((block, idx) => {
                try {
                    const idxA = block.indexOf('A)');
                    const idxB = block.indexOf('B)');
                    const idxC = block.indexOf('C)');
                    const idxD = block.indexOf('D)');
                    const idxE = block.indexOf('E)');
                    const idxAns = block.lastIndexOf('Cevap:');

                    if (idxA > -1 && idxB > -1 && idxC > -1 && idxD > -1 && idxE > -1 && idxAns > -1) {
                        const qText = block.substring(0, idxA).trim();
                        let optA = block.substring(idxA + 2, idxB).trim();
                        let optB = block.substring(idxB + 2, idxC).trim();
                        let optC = block.substring(idxC + 2, idxD).trim();
                        let optD = block.substring(idxD + 2, idxE).trim();
                        let optE = block.substring(idxE + 2, idxAns).trim();
                        
                        if (optC.startsWith(') ')) optC = optC.substring(2).trim();

                        const ans = block.substring(idxAns + 6).trim()[0];
                        const options = [optA, optB, optC, optD, optE];
                        const answerIndex = ['A', 'B', 'C', 'D', 'E'].indexOf(ans);
                        const hapBilgiText = hapMap[idx] ? hapMap[idx] : `Doğru Cevap: ${ans}) ${options[answerIndex]}`;

                        result.push({
                            id: idx,
                            questionText: qText,
                            options,
                            correctAnswer: answerIndex,
                            explanation: hapBilgiText
                        });
                    }
                } catch (e) {
                    console.warn('Hatalı coğrafya bloğu atlandı:', idx);
                }
            });
            return result;
        };

        const HISTORY_KB = parseHistoryData();
        const GEO_KB = parseGeoData(RAW_GEO_DATA, RAW_GEO_HAP_BILGI);

        function generateHistoryQuizSet(mode) {
            let baseSet = [...HISTORY_KB];
            if (mode === 'random20') baseSet = baseSet.sort(() => 0.5 - Math.random()).slice(0, 20);

            return baseSet.map((item) => {
                let distractorPool = HISTORY_KB.filter((x) => Math.abs(x.id - item.id) <= 20 && x.id !== item.id);
                if (distractorPool.length < 4) distractorPool = HISTORY_KB.filter((x) => x.id !== item.id);
                
                distractorPool = distractorPool.sort(() => 0.5 - Math.random());
                const options = distractorPool.slice(0, 4).map((x) => x.topic);
                const correctIndex = Math.floor(Math.random() * 5);
                options.splice(correctIndex, 0, item.topic);

                return {
                    id: item.id,
                    topic: item.topic,
                    questionText: `"${item.detail}"\n\nYukarıda özelliği, tanımı veya önemi verilen tarihi kişi, olay veya kavram aşağıdakilerden hangisidir?`,
                    options: options,
                    correctAnswer: correctIndex,
                    explanation: `${item.topic}: ${item.detail}`,
                };
            });
        }

        function generateGeoQuizSet(mode) {
            let baseSet = [...GEO_KB];
            if (mode === 'random20') baseSet = baseSet.sort(() => 0.5 - Math.random()).slice(0, 20);
            return baseSet;
        }

            isAnswered = true;
            
            const isCorrect = index === quizSet[currentIndex].correctAnswer;
            if (isCorrect) score++;

            gridStatus[currentIndex] = isCorrect ? 'correct' : 'wrong';
            
            renderApp();

            if (currentIndex + 1 < quizSet.length) {
                currentIndex++;
                selectedOption = null;
                isAnswered = false;
                renderApp();

            else if (percentage < 80) message = "İyi bir temel atmışsın, devam et!";

            return `
            <div class="flex-1 flex flex-col items-center justify-center p-6 animate-fade-in bg-white text-center h-full relative z-10 w-full">
              <div class="bg-yellow-100 p-6 rounded-full mb-6 shadow-inner">
                <i data-lucide="trophy" class="text-yellow-500 w-16 h-16"></i>
              </div>
              <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Test Bitti</h2>
              <p class="text-slate-500 text-[15px] mb-10">${message}</p>
              
              <div class="flex w-full gap-4 mb-10">
                <div class="flex-1 bg-slate-50 py-6 px-2 rounded-2xl border border-slate-100">
                  <div class="text-xs text-slate-500 mb-1 font-semibold uppercase tracking-wider">Doğru</div>
                  <div class="text-3xl font-black text-slate-800">${score} <span class="text-lg text-slate-400 font-medium">/ ${totalAnswered}</span></div>
                </div>
                <div class="flex-1 ${theme.bg50} py-6 px-2 rounded-2xl border ${theme.border100}">
                  <div class="text-xs ${theme.text600} mb-1 font-semibold uppercase tracking-wider">Başarı</div>
                  <div class="text-3xl font-black ${theme.text700}">%${percentage}</div>
                </div>
              </div>

              <button 
                onclick="setGameState('subjectSelect')"
                class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-4 px-8 rounded-2xl transition-all shadow-md active:scale-95 text-lg"
              >
                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                Ana Menüye Dön
              </button>
            </div>`;
        }

        function renderApp() {
            let htmlContent = '';
            if (gameState === 'subjectSelect') htmlContent = renderSubjectSelect();
            else if (gameState === 'modeSelect') htmlContent = renderModeSelect();
            else if (gameState === 'questionGrid') htmlContent = renderQuestionGrid();
            else if (gameState === 'playing') htmlContent = renderPlaying();
            else if (gameState === 'result') htmlContent = renderResult();

            updateDOM(htmlContent);
        }

        // Initialize App
        renderApp();

    </script>
</body>
</html>
